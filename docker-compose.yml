services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradingbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: tradingbot_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradingbot -d tradingbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradingbot_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradingbot_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      DATABASE_SYNC_URL: postgresql://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - logs:/var/log/tradingbot
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradingbot_celery_worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      DATABASE_SYNC_URL: postgresql://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - backend
      - redis
    volumes:
      - logs:/var/log/tradingbot
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tradingbot_celery_beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      DATABASE_SYNC_URL: postgresql://tradingbot:${DB_PASSWORD:-changeme}@postgres:5432/tradingbot_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
    dns:
      - 8.8.8.8
      - 8.8.4.4

  # Ollama: only needed if NOT using DEEPSEEK_API_KEY
  # Remove this service if using DeepSeek Cloud API
  ollama:
    image: ollama/ollama:latest
    container_name: tradingbot_ollama
    restart: unless-stopped
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: all
              driver: nvidia

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tradingbot_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://backend:8000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: tradingbot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  logs:
